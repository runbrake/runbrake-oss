name: RunBrake Skill Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  runbrake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: runbrake/runbrake-oss/.github/actions/runbrake-skill-scan@v0.1.2
        with:
          path: .
          version: v0.1.2
          upload-sarif: "true"
